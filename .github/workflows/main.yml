name: Reproduce discussion-10339


on:
  #push:
  #  branches: [ "main" ]
  #pull_request:
  #  branches: [ "main" ]
  workflow_dispatch:

jobs:
  reproduce:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Docker
        uses: docker/setup-docker-action@v5
        with:
          version: v29.3.0

      - name: Docker info
        run: docker info

      - name: Setup Crane
        uses: imjasonh/setup-crane@v0.1

      - name: Pull crane
        run: |
          crane pull mcr.microsoft.com/azure-functions/dotnet-isolated:4-dotnet-isolated8.0 dotnet-crane

      - name: Install Trivy
        run: curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin v0.69.2

      - name: Scan via --input (expected to fail)
        run: trivy image --input dotnet-crane
        continue-on-error: true

      - name: Orca Scan
        env:
          ORCA_SECURITY_PROJECT_KEY: ${{ vars.ORCA_SECURITY_PROJECT_KEY }}
          ORCA_SECURITY_API_TOKEN: ${{ secrets.ORCA_SECURITY_API_TOKEN }}
        run: |
          set +e
          apt update && apt install -y curl
          curl -sfL 'https://raw.GitHubusercontent.com/orcasecurity/orca-cli/main/install.sh' | bash
          orca-cli image scan ${IMAGE_NAME}:${GITHUB_SHA_SHORT} 
        
